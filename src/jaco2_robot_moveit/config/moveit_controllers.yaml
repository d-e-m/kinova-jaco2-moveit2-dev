moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - fingers_controller

  arm_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: True
    joints:
      - jaco2_robot_joint_1
      - jaco2_robot_joint_2
      - jaco2_robot_joint_3
      - jaco2_robot_joint_4
      - jaco2_robot_joint_5
      - jaco2_robot_joint_6

  fingers_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: True
    joints:
      - jaco2_robot_joint_finger_1
      - jaco2_robot_joint_finger_2
      - jaco2_robot_joint_finger_3
      - jaco2_robot_joint_finger_tip_1
      - jaco2_robot_joint_finger_tip_2
      - jaco2_robot_joint_finger_tip_3